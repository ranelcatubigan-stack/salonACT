services:
  - type: web
    name: salonACT
    env: php
    buildCommand: composer install --no-dev && php artisan config:cache
    startCommand: php artisan serve --host=0.0.0.0 --port=10000
    envVars:
      - key: APP_KEY
        generateValue: true
      - key: APP_ENV
        value: production
      - key: APP_URL
        value: https://salonact-jnfs.onrender.com