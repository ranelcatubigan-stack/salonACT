services:
  - type: web
    name: salonACT
    env: php
    buildCommand: composer install --no-dev --optimize-autoloader && php artisan config:cache && php artisan route:cache && php artisan view:cache
    startCommand: php -S 0.0.0.0:10000 -t public
    envVars:
      - key: APP_KEY
        generateValue: true
      - key: APP_ENV
        value: production
      - key: APP_URL
        value: https://salonact-jnfs.onrender.com